run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gofmt
    - goimports
    - bodyclose
    - nilerr
    - exportloopref

linters-settings:
  errcheck:
    check-blank: true
  misspell:
    locale: US
  goimports:
    local-prefixes: github.com/CubePathInc/cubepath-go-sdk

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
